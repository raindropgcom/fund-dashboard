name: Update Fund Dashboard

on:
  push:                # 推送 main 即自动重新生成并部署，避免“push 了网页却没更新”
    branches: [main]
  schedule:
    # 北京时间 9:00–15:59 工作日（UTC+8 → UTC 1-7），覆盖盘中估值 + 盘后净值更新
    # 已收紧到交易时段，私有仓库也能在免费额度(2000分钟/月)内跑完
    - cron: '*/20 1-7 * * 1-5'
  workflow_dispatch:   # 在 Actions 页面手动点一下即可运行，方便首次测试

# Pages 用官方 Actions 部署：需要 pages 写权限 + OIDC 的 id-token
permissions:
  contents: read
  pages: write
  id-token: write

# 避免并发部署互相覆盖
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl lxml apscheduler

      - name: Generate dashboard (one-shot)
        run: python fund_dashboard_trade.py --once

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./fund_code        # HTML 实际在 fund_code/fund_dashboard.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
